<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kargo Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E7ECE4;
    --paper-2:#FFFFFF;
    --card:#FFFFFF;
    --ink:#1B1B1B;
    --ink-soft:#6E6E6E;
    --line:#DADFD8;
    --stamp-red:#D01012;
    --stamp-red-dim:#FBDADA;
    --stamp-green:#00852B;
    --stamp-green-dim:#D7EFDD;
    --stamp-blue:#0057BF;
    --stamp-blue-dim:#D9E6F7;
    --gold:#D8A400;
    --gold-bg:#FFE000;
    --radius:14px;
    --brick-shadow: inset 0 -4px 0 rgba(0,0,0,.15), 0 3px 0 rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    background-color:var(--paper);
    background-image:
      radial-gradient(circle, rgba(0,0,0,.06) 1.6px, transparent 1.6px);
    background-size: 26px 26px;
    color:var(--ink);
    font-family:'Nunito',sans-serif;
    min-height:100vh;
  }
  .wrap{
    max-width:480px;
    margin:0 auto;
    padding:20px 16px 155px;
  }
  header{
    padding:8px 4px 18px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:27px;
    margin:0 0 2px;
    letter-spacing:-0.01em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brick-icon{
    display:inline-flex;
    flex-shrink:0;
    width:26px;
    height:20px;
    background:var(--stamp-red);
    border-radius:4px;
    box-shadow:var(--brick-shadow);
    position:relative;
  }
  .brick-icon::before, .brick-icon::after{
    content:'';
    position:absolute;
    top:-5px;
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--stamp-red);
    box-shadow: inset 0 -2px 0 rgba(0,0,0,.15);
  }
  .brick-icon::before{ left:3px; }
  .brick-icon::after{ right:3px; }
  header p{
    margin:0;
    font-size:13px;
    color:var(--ink-soft);
  }
  .logout-btn{
    flex-shrink:0;
    border:1px solid var(--line);
    background:var(--paper-2);
    color:var(--ink-soft);
    font-size:12px;
    font-weight:500;
    padding:8px 12px;
    border-radius:100px;
    cursor:pointer;
    margin-top:4px;
  }
  .summary{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-bottom:18px;
  }
  .sum-card{
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:12px;
    padding:12px 10px;
    text-align:center;
    box-shadow:0 3px 0 rgba(0,0,0,.12);
  }
  .sum-card .num{
    font-family:'Nunito',sans-serif; font-weight:800;
    font-weight:600;
    font-size:19px;
    display:block;
  }
  .sum-card .lbl{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:2px;
    display:block;
  }
  .tabs{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:9px 2px;
    border-radius:8px;
    font-size:11.5px;
    font-weight:700;
    font-family:'Nunito',sans-serif;
    border:2px solid var(--ink);
    background:var(--paper-2);
    color:var(--ink-soft);
    cursor:pointer;
    user-select:none;
    transition:all .15s ease;
  }
  .tab.active{
    background:var(--stamp-blue);
    color:#fff;
    border-color:var(--ink);
  }
  .list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .card{
    position:relative;
    background:var(--card);
    border:2px solid var(--ink);
    border-left:8px solid var(--stamp-red);
    border-radius:var(--radius);
    padding:16px 14px 13px;
    display:flex;
    align-items:center;
    gap:12px;
    overflow:visible;
    transition:border-color .2s ease;
    box-shadow:0 3px 0 rgba(0,0,0,.12);
  }
  .card::before, .card::after{
    content:'';
    position:absolute;
    top:-7px;
    width:11px;
    height:11px;
    border-radius:50%;
    background:var(--stamp-red);
    border:2px solid var(--ink);
    box-shadow: inset 0 -2px 0 rgba(0,0,0,.18);
    transition:background .2s ease;
  }
  .card::before{ left:16px; }
  .card::after{ left:34px; }
  .card.shipped{ border-left-color:var(--stamp-green); }
  .card.shipped::before, .card.shipped::after{ background:var(--stamp-green); }
  .card.completed{ border-left-color:var(--stamp-blue); opacity:.8; }
  .card.completed::before, .card.completed::after{ background:var(--stamp-blue); }
  .card-body{ flex:1; min-width:0; padding-right:22px; }
  .card-name{
    font-weight:800;
    font-size:15px;
    margin:0 0 3px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .card-meta{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Nunito',sans-serif; font-weight:800;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .card-meta .price{
    color:var(--ink);
    background:var(--gold-bg);
    font-weight:800;
    padding:2px 8px;
    border-radius:100px;
    border:1.5px solid var(--ink);
  }
  .card-note{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:3px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .platform-row{
    display:flex;
    gap:6px;
    margin-top:7px;
    flex-wrap:wrap;
  }
  .platform-pill{
    font-size:11px;
    font-weight:700;
    font-family:'Nunito',sans-serif;
    padding:5px 11px;
    border-radius:8px;
    border:2px solid var(--ink);
    background:var(--paper-2);
    color:var(--ink-soft);
    cursor:pointer;
    user-select:none;
    box-shadow:0 2px 0 rgba(0,0,0,.15);
  }
  .platform-pill[data-platform-name="Dolap"].active{ background:var(--gold-bg); color:var(--ink); }
  .platform-pill[data-platform-name="Gardrops"].active{ background:var(--stamp-blue); color:#fff; }
  .platform-pill[data-platform-name="Sahibinden"].active{ background:var(--stamp-red); color:#fff; }
  .stamps-col{ flex-shrink:0; display:flex; gap:7px; }
  .stamp-btn{
    flex-shrink:0;
    width:46px;
    height:46px;
    border-radius:50%;
    border:2.5px solid var(--ink);
    background:var(--stamp-red-dim);
    color:var(--stamp-red);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:9px;
    text-align:center;
    line-height:1.1;
    cursor:pointer;
    box-shadow:0 3px 0 rgba(0,0,0,.18);
    transform:rotate(-6deg);
    transition:transform .25s cubic-bezier(.34,1.56,.64,1), background .2s ease, color .2s ease, border-color .2s ease, opacity .2s ease;
  }
  .stamp-btn.shipped{
    border-color:var(--ink);
    background:var(--stamp-green-dim);
    color:var(--stamp-green);
    transform:rotate(-6deg) scale(1.06);
  }
  .stamp-btn.complete-stamp{
    border-color:var(--line);
    background:var(--paper-2);
    color:var(--ink-soft);
    opacity:.45;
    box-shadow:none;
  }
  .stamp-btn.complete-stamp.active{
    border-color:var(--ink);
    background:var(--stamp-blue-dim);
    color:var(--stamp-blue);
    opacity:1;
    box-shadow:0 3px 0 rgba(0,0,0,.18);
    transform:rotate(-6deg) scale(1.06);
  }
  .stamp-btn.complete-stamp.enabled{ opacity:1; box-shadow:0 3px 0 rgba(0,0,0,.18); }
  .stamp-btn:active{ transform:rotate(-6deg) scale(0.9); }
  .del-btn{
    position:absolute;
    top:8px;
    right:8px;
    width:24px;
    height:24px;
    border-radius:50%;
    border:none;
    background:transparent;
    color:var(--ink-soft);
    font-size:14px;
    cursor:pointer;
    line-height:1;
    padding:0;
  }
  .clear-bar{ display:flex; justify-content:flex-end; margin:-8px 0 12px; }
  .clear-bar button{
    border:none;
    background:transparent;
    color:var(--stamp-red);
    font-size:12.5px;
    font-weight:500;
    cursor:pointer;
    padding:4px 2px;
  }
  .empty{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty p{ margin:0 0 4px; font-size:14px; }
  .fab{
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%);
    width:min(448px, calc(100% - 32px));
    background:var(--stamp-red);
    color:#fff;
    border:2.5px solid var(--ink);
    border-radius:14px;
    padding:15px 0;
    font-size:16px;
    font-weight:700;
    font-family:'Fredoka',sans-serif;
    cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.25);
  }
  .fab:active{ box-shadow:0 2px 0 rgba(0,0,0,.25); transform:translateX(-50%) translateY(3px); }
  .fab-secondary{
    bottom:80px;
    background:var(--stamp-blue);
  }
  .fab-secondary:active{ transform:translateX(-50%) translateY(3px); }
  .modal-bg{
    position:fixed;
    inset:0;
    background:rgba(30,27,22,.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:20;
  }
  .modal-bg.open{ display:flex; }
  .modal{
    background:var(--paper-2);
    width:100%;
    max-width:480px;
    border-radius:20px 20px 0 0;
    padding:22px 20px 26px;
  }
  .modal h2{
    font-family:'Fredoka',sans-serif;
    font-size:19px;
    margin:0 0 16px;
  }
  .field{ margin-bottom:12px; }
  .field label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:5px;
    font-weight:500;
  }
  .field input{
    width:100%;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--card);
    font-size:15px;
    font-family:'Nunito',sans-serif;
    color:var(--ink);
  }
  .field input:focus{ outline:none; border-color:var(--ink-soft); }
  .field-hint{ font-weight:400; font-size:11px; color:var(--ink-soft); text-transform:none; }
  .price-row{ display:flex; gap:8px; margin-bottom:8px; }
  .price-row input{
    flex:1;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--card);
    font-size:15px;
    font-family:'Nunito',sans-serif;
    color:var(--ink);
  }
  .price-row input:focus{ outline:none; border-color:var(--ink-soft); }
  .remove-price{
    flex-shrink:0;
    width:38px;
    height:38px;
    border-radius:10px;
    border:2px solid var(--ink);
    background:var(--stamp-red-dim);
    color:var(--stamp-red);
    font-size:16px;
    font-weight:700;
    cursor:pointer;
  }
  .add-price-btn{
    width:100%;
    padding:10px 0;
    border-radius:10px;
    border:2px dashed var(--line);
    background:transparent;
    color:var(--ink-soft);
    font-weight:700;
    font-family:'Fredoka',sans-serif;
    font-size:13px;
    cursor:pointer;
  }
  .price-breakdown{
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .notes-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:40vh;
    overflow-y:auto;
    margin:14px 0 6px;
  }
  .note-row{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:10px;
    padding:9px 10px;
    box-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .note-text{
    flex:1;
    font-size:13.5px;
    font-weight:600;
    overflow-wrap:anywhere;
  }
  .note-sold-btn{
    flex-shrink:0;
    border:2px solid var(--ink);
    background:var(--stamp-green-dim);
    color:var(--stamp-green);
    font-family:'Fredoka',sans-serif;
    font-size:11px;
    font-weight:700;
    padding:7px 9px;
    border-radius:8px;
    cursor:pointer;
    white-space:nowrap;
  }
  .note-del-btn{
    flex-shrink:0;
    border:none;
    background:transparent;
    color:var(--ink-soft);
    font-size:14px;
    cursor:pointer;
    padding:4px;
  }
  .notes-empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    padding:20px 0;
  }
  .modal-actions{ display:flex; gap:10px; margin-top:6px; }
  .modal-actions button{
    flex:1;
    padding:13px 0;
    border-radius:100px;
    font-size:14px;
    font-weight:600;
    border:1px solid var(--line);
    cursor:pointer;
  }
  .btn-cancel{ background:transparent; color:var(--ink-soft); }
  .btn-save{ background:var(--stamp-blue); color:#fff; border:2px solid var(--ink); font-family:'Fredoka',sans-serif; box-shadow:0 3px 0 rgba(0,0,0,.2); }
  .toast{
    position:fixed;
    top:16px;
    left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:var(--paper-2);
    padding:10px 18px;
    border-radius:100px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
    z-index:30;
  }
  .toast.show{ opacity:1; }

  .auth-screen{
    max-width:380px;
    margin:0 auto;
    padding:60px 20px 40px;
    min-height:100vh;
  }
  .auth-screen h1{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:26px;
    margin:0 0 6px;
    text-align:center;
  }
  .auth-screen p.sub{
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    margin:0 0 28px;
  }
  .auth-toggle{
    display:flex;
    background:var(--paper-2);
    border-radius:100px;
    padding:4px;
    margin-bottom:22px;
    border:1px solid var(--line);
  }
  .auth-toggle button{
    flex:1;
    border:none;
    background:transparent;
    padding:10px 0;
    border-radius:100px;
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .auth-toggle button.active{
    background:var(--stamp-blue);
    color:#fff;
  }
  .auth-error{
    background:var(--stamp-red-dim);
    color:var(--stamp-red);
    border-radius:10px;
    padding:10px 12px;
    font-size:12.5px;
    margin-bottom:14px;
    display:none;
  }
  .auth-error.show{ display:block; }
  .auth-submit{
    width:100%;
    padding:14px 0;
    border-radius:12px;
    border:2.5px solid var(--ink);
    background:var(--stamp-red);
    color:#fff;
    font-family:'Fredoka',sans-serif;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    margin-top:6px;
    box-shadow:0 4px 0 rgba(0,0,0,.25);
  }
  .auth-submit:active{ box-shadow:0 1px 0 rgba(0,0,0,.25); transform:translateY(3px); }
  .auth-submit:disabled{ opacity:.6; }
  .loading-screen{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    color:var(--ink-soft);
    font-size:14px;
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">Yükleniyor…</div>

<div class="auth-screen" id="authScreen" style="display:none;">
  <h1><span class="brick-icon"></span>Kargo Takip</h1>
  <p class="sub">Verilerinize her cihazdan ulaşmak için giriş yapın.</p>

  <div class="auth-toggle">
    <button id="tabLogin" class="active">Giriş yap</button>
    <button id="tabSignup">Üye ol</button>
  </div>

  <div class="auth-error" id="authError"></div>

  <div class="field">
    <label>E-posta</label>
    <input type="email" id="authEmail" placeholder="ornek@mail.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Şifre</label>
    <input type="password" id="authPassword" placeholder="En az 6 karakter" autocomplete="current-password">
  </div>

  <button class="auth-submit" id="authSubmit">Giriş yap</button>
</div>

<div class="wrap" id="appScreen" style="display:none;">
  <header>
    <div>
      <h1><span class="brick-icon"></span>Kargo Takip</h1>
      <p>Kargoya verince ve iş bitince damgala.</p>
    </div>
    <button class="logout-btn" id="logoutBtn">Çıkış yap</button>
  </header>

  <div class="summary" id="summary"></div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-filter="all">Tümü</div>
    <div class="tab" data-filter="pending">Bekliyor</div>
    <div class="tab" data-filter="shipped">Kargolandı</div>
    <div class="tab" data-filter="completed">Tamamlandı</div>
  </div>

  <div class="clear-bar" id="clearBar" style="display:none;">
    <button id="clearBtn">Tamamlananları sil</button>
  </div>

  <div class="list" id="list"></div>
</div>

<button class="fab fab-secondary" id="notesBtn" style="display:none;">📝 Henüz satılmadı</button>
<button class="fab" id="addBtn" style="display:none;">+ Ürün ekle</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>Yeni ürün</h2>
    <div class="field">
      <label>Ürün adı <span class="field-hint">— birlikte satılan başka ürün varsa "+" ile ekleyin</span></label>
      <div id="nameRows"></div>
      <button type="button" class="add-price-btn" id="addNameBtn">+ Ürün adı ekle</button>
    </div>
    <div class="field">
      <label>Fiyat(lar) TL <span class="field-hint">— birlikte satılan başka ürün varsa "+" ile ekleyin</span></label>
      <div id="priceRows"></div>
      <button type="button" class="add-price-btn" id="addPriceBtn">+ Fiyat ekle</button>
    </div>
    <div class="field">
      <label>Not (opsiyonel)</label>
      <input type="text" id="inpNote" placeholder="Örn. Alıcı: Ayşe, adres notu vb." maxlength="80">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBtn">Vazgeç</button>
      <button class="btn-save" id="saveBtn">Kaydet</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="notesModalBg">
  <div class="modal">
    <h2>Henüz satılmadı</h2>
    <div class="field">
      <label>Yeni not</label>
      <div class="price-row">
        <input type="text" id="inpNoteText" placeholder="Örn. Kırmızı kazak, XL beden, 2. el" maxlength="120">
        <button type="button" class="remove-price" id="addNoteBtn" style="background:var(--stamp-blue-dim); color:var(--stamp-blue);">+</button>
      </div>
    </div>
    <div id="notesList" class="notes-list"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="closeNotesBtn">Kapat</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ============================================================
   1) FIREBASE AYARLARI
   Firebase konsolundan aldığınız bilgileri buraya yapıştırın.
   Rehber: mesajın altındaki kurulum adımlarına bakın.
============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCqu_qHvSyMQ6iFkcytrEIT0gUBVCHLqOM",
  authDomain: "karalitakip.firebaseapp.com",
  projectId: "karalitakip",
  storageBucket: "karalitakip.firebasestorage.app",
  messagingSenderId: "836733462856",
  appId: "1:836733462856:web:9456a49cdbf1fce89d6b7d",
  measurementId: "G-743569ZYG5"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let products = [];
let filter = 'all';
let currentUser = null;
let authMode = 'login';

function formatPrice(n){
  const num = Number(n) || 0;
  return num.toLocaleString('tr-TR', {maximumFractionDigits:2}) + ' TL';
}
function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('tr-TR', {day:'2-digit', month:'2-digit', year:'2-digit'});
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1500);
}
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

let notes = [];

async function loadProducts(){
  try{
    const doc = await db.collection('users').doc(currentUser.uid).get();
    const data = doc.exists ? doc.data() : {};
    products = data.products || [];
    notes = data.notes || [];
  }catch(e){
    products = [];
    notes = [];
    showToast('Veriler yüklenemedi');
  }
  render();
  renderNotes();
}
async function saveProducts(){
  try{
    await db.collection('users').doc(currentUser.uid).set({products, notes}, {merge:true});
  }catch(e){
    showToast('Kaydedilemedi, internet bağlantınızı kontrol edin');
  }
}

const authScreen = document.getElementById('authScreen');
const appScreen = document.getElementById('appScreen');
const loadingScreen = document.getElementById('loadingScreen');
const addBtn = document.getElementById('addBtn');
const authError = document.getElementById('authError');

function setAuthMode(mode){
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode==='login');
  document.getElementById('tabSignup').classList.toggle('active', mode==='signup');
  document.getElementById('authSubmit').textContent = mode==='login' ? 'Giriş yap' : 'Hesap oluştur';
  authError.classList.remove('show');
}
document.getElementById('tabLogin').addEventListener('click', ()=>setAuthMode('login'));
document.getElementById('tabSignup').addEventListener('click', ()=>setAuthMode('signup'));

function authErrorMessage(code){
  const map = {
    'auth/invalid-email':'Geçersiz e-posta adresi.',
    'auth/user-not-found':'Bu e-posta ile kayıtlı hesap yok, önce üye olun.',
    'auth/wrong-password':'Şifre hatalı.',
    'auth/email-already-in-use':'Bu e-posta zaten kayıtlı, giriş yapmayı deneyin.',
    'auth/weak-password':'Şifre en az 6 karakter olmalı.',
    'auth/invalid-credential':'E-posta veya şifre hatalı.'
  };
  return map[code] || 'Bir şeyler ters gitti, tekrar deneyin.';
}

document.getElementById('authSubmit').addEventListener('click', async ()=>{
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  authError.classList.remove('show');
  if(!email || !password){
    authError.textContent = 'E-posta ve şifre girin.';
    authError.classList.add('show');
    return;
  }
  const btn = document.getElementById('authSubmit');
  btn.disabled = true;
  try{
    if(authMode === 'login'){
      await auth.signInWithEmailAndPassword(email, password);
    }else{
      await auth.createUserWithEmailAndPassword(email, password);
    }
  }catch(e){
    authError.textContent = authErrorMessage(e.code);
    authError.classList.add('show');
  }
  btn.disabled = false;
});

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await auth.signOut();
});

auth.onAuthStateChanged(async (user)=>{
  loadingScreen.style.display = 'none';
  if(user){
    currentUser = user;
    authScreen.style.display = 'none';
    appScreen.style.display = 'block';
    addBtn.style.display = 'block';
    document.getElementById('notesBtn').style.display = 'block';
    await loadProducts();
  }else{
    currentUser = null;
    authScreen.style.display = 'block';
    appScreen.style.display = 'none';
    addBtn.style.display = 'none';
    document.getElementById('notesBtn').style.display = 'none';
  }
});

function render(){
  const list = document.getElementById('list');
  const summary = document.getElementById('summary');
  const clearBar = document.getElementById('clearBar');

  const total = products.length;
  const completedCount = products.filter(p=>p.completed).length;
  const pending = products.filter(p=>!p.shipped).length;
  const totalValue = products.reduce((s,p)=>s+(Number(p.price)||0),0);

  summary.innerHTML = `
    <div class="sum-card"><span class="num">${total}</span><span class="lbl">toplam ürün</span></div>
    <div class="sum-card"><span class="num">${pending}</span><span class="lbl">bekliyor</span></div>
    <div class="sum-card"><span class="num">${completedCount}</span><span class="lbl">tamamlandı</span></div>
    <div class="sum-card"><span class="num">${formatPrice(totalValue)}</span><span class="lbl">toplam tutar</span></div>
  `;

  clearBar.style.display = completedCount > 0 ? 'flex' : 'none';

  let filtered = products;
  if(filter === 'pending') filtered = products.filter(p=>!p.shipped);
  if(filter === 'shipped') filtered = products.filter(p=>p.shipped && !p.completed);
  if(filter === 'completed') filtered = products.filter(p=>p.completed);

  filtered = [...filtered].sort((a,b)=>{
    const rank = p => p.completed ? 2 : (p.shipped ? 1 : 0);
    if(rank(a) !== rank(b)) return rank(a) - rank(b);
    return new Date(b.dateAdded) - new Date(a.dateAdded);
  });

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty"><p>Burada henüz ürün yok.</p><p>Aşağıdaki butondan ekleyebilirsin.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(p => {
    let statusLine = 'Eklendi: ' + formatDate(p.dateAdded);
    if(p.shipped) statusLine = 'Kargolandı: ' + formatDate(p.dateShipped);
    if(p.completed) statusLine = 'Tamamlandı: ' + formatDate(p.dateCompleted);
    return `
    <div class="card ${p.shipped ? 'shipped' : ''} ${p.completed ? 'completed' : ''}" data-id="${p.id}">
      <button class="del-btn" data-del="${p.id}" aria-label="Sil">✕</button>
      <div class="card-body">
        <p class="card-name">${escapeHtml(p.name)}</p>
        <div class="card-meta">
          <span class="price">${formatPrice(p.price)}</span>
          <span>${statusLine}</span>
        </div>
        ${p.prices && p.prices.length > 1 ? `<p class="price-breakdown">${p.prices.map(n=>formatPrice(n)).join(' + ')}</p>` : ''}
        ${p.note ? `<p class="card-note">${escapeHtml(p.note)}</p>` : ''}
        <div class="platform-row">
          ${['Dolap','Gardrops','Sahibinden'].map(name => `
            <div class="platform-pill ${p.platform === name ? 'active' : ''}" data-platform-id="${p.id}" data-platform-name="${name}">${name}</div>
          `).join('')}
        </div>
      </div>
      <div class="stamps-col">
        <div class="stamp-btn ${p.shipped ? 'shipped' : ''}" data-toggle-ship="${p.id}">
          ${p.shipped ? 'KARGO-<br>LANDI' : 'KARGOLA'}
        </div>
        <div class="stamp-btn complete-stamp ${p.completed ? 'active' : ''} ${p.shipped ? 'enabled' : ''}" data-toggle-complete="${p.id}">
          TAMAM-<br>LANDI
        </div>
      </div>
    </div>
  `;
  }).join('');
}

document.getElementById('list').addEventListener('click', async (e)=>{
  const shipToggle = e.target.closest('[data-toggle-ship]');
  const completeToggle = e.target.closest('[data-toggle-complete]');
  const delId = e.target.closest('[data-del]');
  const platformPill = e.target.closest('[data-platform-id]');

  if(platformPill){
    const id = platformPill.getAttribute('data-platform-id');
    const name = platformPill.getAttribute('data-platform-name');
    const p = products.find(x=>x.id===id);
    if(p){
      p.platform = (p.platform === name) ? null : name;
      render();
      await saveProducts();
    }
  }else if(shipToggle){
    const id = shipToggle.getAttribute('data-toggle-ship');
    const p = products.find(x=>x.id===id);
    if(p){
      p.shipped = !p.shipped;
      p.dateShipped = p.shipped ? new Date().toISOString() : null;
      if(!p.shipped){ p.completed = false; p.dateCompleted = null; }
      render();
      await saveProducts();
      showToast(p.shipped ? 'Kargolandı olarak işaretlendi' : 'Bekliyor olarak işaretlendi');
    }
  }else if(completeToggle){
    const id = completeToggle.getAttribute('data-toggle-complete');
    const p = products.find(x=>x.id===id);
    if(p){
      if(!p.shipped){ showToast('Önce kargolandı olarak işaretle'); return; }
      p.completed = !p.completed;
      p.dateCompleted = p.completed ? new Date().toISOString() : null;
      render();
      await saveProducts();
      showToast(p.completed ? 'Tamamlandı olarak işaretlendi' : 'Tamamlandı işareti kaldırıldı');
    }
  }else if(delId){
    const id = delId.getAttribute('data-del');
    products = products.filter(x=>x.id!==id);
    render();
    await saveProducts();
  }
});

document.getElementById('clearBtn').addEventListener('click', async ()=>{
  const count = products.filter(p=>p.completed).length;
  if(count === 0) return;
  products = products.filter(p=>!p.completed);
  render();
  await saveProducts();
  showToast('Tamamlanan ürünler silindi');
});

document.getElementById('tabs').addEventListener('click', (e)=>{
  const tab = e.target.closest('.tab');
  if(!tab) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  filter = tab.getAttribute('data-filter');
  render();
});

const modalBg = document.getElementById('modalBg');
const priceRowsEl = document.getElementById('priceRows');
const nameRowsEl = document.getElementById('nameRows');
const MAX_ROWS = 8;
let pendingNoteId = null;

function renderPriceRows(values){
  priceRowsEl.innerHTML = values.map((v, i) => `
    <div class="price-row">
      <input type="number" inputmode="decimal" class="price-input" placeholder="${i===0 ? 'Örn. 350' : 'Ek ürün fiyatı'}" value="${v ?? ''}">
      ${values.length > 1 ? `<button type="button" class="remove-price" data-remove-row="${i}">✕</button>` : ''}
    </div>
  `).join('');
}
function renderNameRows(values){
  nameRowsEl.innerHTML = values.map((v, i) => `
    <div class="price-row">
      <input type="text" class="name-input" placeholder="${i===0 ? 'Örn. Siyah deri cüzdan' : 'Ek ürün adı'}" maxlength="60" value="${v ? escapeHtml(v) : ''}">
      ${values.length > 1 ? `<button type="button" class="remove-price" data-remove-name-row="${i}">✕</button>` : ''}
    </div>
  `).join('');
}

priceRowsEl.addEventListener('click', (e)=>{
  const rem = e.target.closest('[data-remove-row]');
  if(!rem) return;
  const idx = Number(rem.getAttribute('data-remove-row'));
  const current = Array.from(priceRowsEl.querySelectorAll('.price-input')).map(i=>i.value);
  current.splice(idx, 1);
  renderPriceRows(current.length ? current : ['']);
});
nameRowsEl.addEventListener('click', (e)=>{
  const rem = e.target.closest('[data-remove-name-row]');
  if(!rem) return;
  const idx = Number(rem.getAttribute('data-remove-name-row'));
  const current = Array.from(nameRowsEl.querySelectorAll('.name-input')).map(i=>i.value);
  current.splice(idx, 1);
  renderNameRows(current.length ? current : ['']);
});

document.getElementById('addPriceBtn').addEventListener('click', ()=>{
  const current = Array.from(priceRowsEl.querySelectorAll('.price-input')).map(i=>i.value);
  if(current.length >= MAX_ROWS){
    showToast('En fazla ' + MAX_ROWS + ' fiyat ekleyebilirsin');
    return;
  }
  current.push('');
  renderPriceRows(current);
});
document.getElementById('addNameBtn').addEventListener('click', ()=>{
  const current = Array.from(nameRowsEl.querySelectorAll('.name-input')).map(i=>i.value);
  if(current.length >= MAX_ROWS){
    showToast('En fazla ' + MAX_ROWS + ' ürün adı ekleyebilirsin');
    return;
  }
  current.push('');
  renderNameRows(current);
});

function openProductModal(prefillName){
  renderNameRows([prefillName || '']);
  renderPriceRows(['']);
  document.getElementById('inpNote').value='';
  modalBg.classList.add('open');
  setTimeout(()=>{
    const firstInput = nameRowsEl.querySelector('.name-input');
    if(firstInput) firstInput.focus();
  }, 100);
}

addBtn.addEventListener('click', ()=>{
  pendingNoteId = null;
  openProductModal('');
});
document.getElementById('cancelBtn').addEventListener('click', ()=>{
  modalBg.classList.remove('open');
  pendingNoteId = null;
});
modalBg.addEventListener('click', (e)=>{
  if(e.target === modalBg){
    modalBg.classList.remove('open');
    pendingNoteId = null;
  }
});

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const names = Array.from(nameRowsEl.querySelectorAll('.name-input'))
    .map(i => i.value.trim())
    .filter(n => n.length > 0);
  const note = document.getElementById('inpNote').value.trim();
  const prices = Array.from(priceRowsEl.querySelectorAll('.price-input'))
    .map(i => Number(i.value))
    .filter(n => !isNaN(n) && n > 0);
  if(names.length === 0){
    showToast('Ürün adı gerekli');
    return;
  }
  const total = prices.reduce((s,n)=>s+n, 0);
  products.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    name: names.join(' + '), price: total, prices: prices.length ? prices : [0], note,
    dateAdded: new Date().toISOString(),
    shipped: false,
    dateShipped: null,
    completed: false,
    dateCompleted: null,
    platform: null
  });
  if(pendingNoteId){
    notes = notes.filter(n => n.id !== pendingNoteId);
    pendingNoteId = null;
  }
  modalBg.classList.remove('open');
  render();
  await saveProducts();
  showToast('Ürün eklendi');
});

/* ---------- Henüz satılmadı: not defteri ---------- */
const notesModalBg = document.getElementById('notesModalBg');
const notesListEl = document.getElementById('notesList');
const notesBtn = document.getElementById('notesBtn');

function renderNotes(){
  if(notes.length === 0){
    notesListEl.innerHTML = `<p class="notes-empty">Henüz not yok. Satılmayı bekleyen ürünleri buraya yazabilirsin.</p>`;
  }else{
    notesListEl.innerHTML = [...notes].reverse().map(n => `
      <div class="note-row" data-note-id="${n.id}">
        <span class="note-text">${escapeHtml(n.text)}</span>
        <button type="button" class="note-sold-btn" data-note-sold="${n.id}">Sattım →</button>
        <button type="button" class="note-del-btn" data-note-del="${n.id}">✕</button>
      </div>
    `).join('');
  }
  const count = notes.length;
  notesBtn.textContent = count > 0 ? `📝 Henüz satılmadı (${count})` : '📝 Henüz satılmadı';
}

notesBtn.addEventListener('click', ()=>{
  document.getElementById('inpNoteText').value = '';
  notesModalBg.classList.add('open');
  setTimeout(()=>document.getElementById('inpNoteText').focus(), 100);
});
document.getElementById('closeNotesBtn').addEventListener('click', ()=>{
  notesModalBg.classList.remove('open');
});
notesModalBg.addEventListener('click', (e)=>{
  if(e.target === notesModalBg) notesModalBg.classList.remove('open');
});

async function addNote(){
  const text = document.getElementById('inpNoteText').value.trim();
  if(!text) return;
  notes.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    text,
    dateAdded: new Date().toISOString()
  });
  document.getElementById('inpNoteText').value = '';
  renderNotes();
  await saveProducts();
}
document.getElementById('addNoteBtn').addEventListener('click', addNote);
document.getElementById('inpNoteText').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ e.preventDefault(); addNote(); }
});

notesListEl.addEventListener('click', async (e)=>{
  const soldBtn = e.target.closest('[data-note-sold]');
  const delBtn = e.target.closest('[data-note-del]');
  if(soldBtn){
    const id = soldBtn.getAttribute('data-note-sold');
    const n = notes.find(x=>x.id===id);
    if(n){
      pendingNoteId = id;
      notesModalBg.classList.remove('open');
      openProductModal(n.text);
    }
  }else if(delBtn){
    const id = delBtn.getAttribute('data-note-del');
    notes = notes.filter(x=>x.id!==id);
    renderNotes();
    await saveProducts();
  }
});
</script>
